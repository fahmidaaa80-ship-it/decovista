name: decovista
description: Smart Interior Design & Furniture Marketplace
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Supabase
  supabase_flutter: ^2.12.4

  # Navigation
  go_router: ^17.2.3

  # UI Components
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  flutter_rating_bar: ^4.0.1
  badges: ^3.2.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1

  # Icons
  font_awesome_flutter: ^11.0.0

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.2.0

  # Image Picker
  image_picker: ^1.2.2

  # Payment Integration
  flutter_bkash: ^0.3.1

  # Utils
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env